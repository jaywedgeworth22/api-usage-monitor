name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 9 * * 2"
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    # Self-hosted CI with hosted fallback; dependabot forced hosted. See ci.yml
    # for the full rationale/runbook. Clear UM_CI_RUNNER for instant fallback.
    # NOTE: CodeQL downloads its analysis bundle at runtime; on the self-hosted
    # myoung34 runner this is UNPROVEN — before setting UM_CI_RUNNER, dispatch
    # this workflow on the branch with the var set and confirm the bundle
    # resolves and total runtime stays under this timeout. If it does not, keep
    # codeql.yml on 'ubuntu-latest' (revert this line) and treat the CodeQL
    # required context separately.
    runs-on: ${{ (github.actor != 'dependabot[bot]' && vars.UM_CI_RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
