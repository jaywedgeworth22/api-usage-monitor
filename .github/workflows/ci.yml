name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    # Self-hosted CI with automatic hosted fallback (fleet runner-offload).
    # Resolves to the runner label in the repo variable UM_CI_RUNNER when it is
    # set (e.g. usage-ci), otherwise to 'ubuntu-latest'. Dependabot PRs are
    # forced back to hosted runners: their third-party install/build scripts
    # must never run beside production containers and a repo-scoped runner PAT
    # on the shared self-hosted box. While UM_CI_RUNNER is unset this workflow
    # behaves exactly as before (hosted).
    # Runbook — clearing the variable is an instant, global hosted fallback:
    #   gh variable set UM_CI_RUNNER --repo jaywedgeworth22/Usage-Monitor --body ""
    runs-on: ${{ (github.actor != 'dependabot[bot]' && vars.UM_CI_RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 30
    env:
      CI: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Ensure sqlite3 CLI is installed
        run: |
          if ! command -v sqlite3 &> /dev/null; then
            echo "sqlite3 not found, installing..."
            if command -v apt-get &> /dev/null; then
              if command -v sudo &> /dev/null; then
                sudo apt-get update && sudo apt-get install -y sqlite3
              else
                apt-get update && apt-get install -y sqlite3
              fi
            elif command -v apk &> /dev/null; then
              apk add sqlite
            fi
          fi

      - name: Configure test database
        run: echo "DATABASE_URL=file:${RUNNER_TEMP}/api-usage-monitor-ci.db" >> "$GITHUB_ENV"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Test safe migration path
        run: npm run test:migrate-safe

      - name: Test pre-migration SQLite backup
        run: npm run test:sqlite-backup

      - name: Test startup configuration
        run: npm run test:startup-config

      - name: Test Oracle deployment circuit breakers
        run: npm run test:oracle-deploy

      - name: Verify Apple projects
        run: npm run test:apple-projects

      - name: Audit high-severity dependencies
        run: npm audit --audit-level=high

      - name: Production build
        run: npm run build
