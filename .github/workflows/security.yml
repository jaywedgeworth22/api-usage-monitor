name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "41 10 * * 1"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Refuse untrusted PR source
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "::error::Fork PRs cannot run security scans."
            exit 1
          fi
          actor="${{ github.actor }}"
          if printf '%s' "$actor" | grep -Eq '\[bot\]$'; then
            case "$actor" in
              'cursor[bot]'|'dependabot[bot]')
                echo "Trusted same-repo bot: $actor"
                ;;
              *)
                echo "::error::Untrusted bot PRs cannot run security scans (untrusted bot: $actor)."
                exit 1
                ;;
            esac
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Clean stale gitleaks installer temp files
        shell: bash
        run: |
          set -euo pipefail
          tmp_root="${TMPDIR:-/tmp}"
          tmp_root="${tmp_root%/}"
          rm -f "$tmp_root/gitleaks.tmp"
          rm -rf "$tmp_root/gitleaks-8.24.3"
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
