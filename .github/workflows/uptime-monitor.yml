name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch: {}

concurrency:
  group: usage-monitor-uptime
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  actions: read # lets "Count consecutive readiness failures" read this workflow's own run history

jobs:
  # INVARIANT: this job's conclusion is engineered to equal the readiness-probe
  # outcome and nothing else. Every side-effect step (issue open/close,
  # PagerDuty trigger/resolve) and the streak counter are continue-on-error, so
  # their failures are logged but can never flip the run's conclusion. The ONLY
  # step permitted to fail the run is the final readiness gate, which fails iff
  # the probe failed. That invariant is what makes counting prior-run
  # conclusions equivalent to counting prior *readiness* failures - without it,
  # e.g. a PagerDuty "resolve" curl failing after a SUCCESSFUL check would
  # conclude the run as failure and be miscounted later as downtime.
  ping:
    # Self-hosted CI with hosted fallback; dependabot forced hosted. See ci.yml
    # for the full rationale/runbook. Clear UM_CI_RUNNER for instant fallback.
    # This 5-minute cron is the steady hosted-minutes drain, so moving it is the
    # main saving. It relies on curl + jq (readiness probe) and gh (incident
    # issue/streak steps, all continue-on-error); confirm those exist on the
    # runner during the proving dispatch — the readiness gate needs only curl+jq.
    runs-on: ${{ (github.actor != 'dependabot[bot]' && vars.UM_CI_RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 5
    env:
      # Consecutive failed 5-minute checks required before this fires a
      # *fresh* incident notification (new issue + optional PagerDuty page).
      # A single transient blip won't page anyone, but 3 in a row (15
      # minutes) will - a lot tighter than the ~90 minutes an outage
      # previously ran undetected, because (unlike before) this workflow now
      # also fails its own run on every failed check, so a human watching the
      # Actions tab/badge/GitHub notifications sees red immediately even
      # below this threshold.
      FAILURE_THRESHOLD: 3
      INCIDENT_TITLE: "[Uptime] usage.jays.services readiness failure"
      PAGERDUTY_DEDUP_KEY: "usage-monitor-uptime-readiness"
      # Optional. Unset until the owner adds the ALERT_PAGERDUTY_ROUTING_KEY
      # repo secret (Settings -> Secrets and variables -> Actions), matching
      # the fleet's ALERT_PAGERDUTY_ROUTING_KEY convention. Every step that
      # pages/resolves PagerDuty checks this is non-empty first and is a
      # clean no-op otherwise - no PagerDuty account is required to use the
      # GitHub-issue + failed-run alerting below.
      PAGERDUTY_ROUTING_KEY: ${{ secrets.ALERT_PAGERDUTY_ROUTING_KEY }}
    steps:
      - name: Readiness check
        id: check
        shell: bash
        # Designed to always exit 0 (curl failure is captured into http_code,
        # jq runs inside an `if`), so it never contributes to the run's
        # conclusion - only the final readiness gate does.
        run: |
          set -u
          body_file="$RUNNER_TEMP/usage-ready.json"
          http_code=$(curl \
            --silent \
            --show-error \
            --location \
            --max-time 10 \
            --retry 2 \
            --retry-all-errors \
            --output "$body_file" \
            --write-out "%{http_code}" \
            https://usage.jays.services/api/ready) || http_code="000"

          if [ "$http_code" = "200" ] && jq -e '.ok == true' "$body_file" >/dev/null 2>&1; then
            status="ok"
          else
            status="fail"
          fi

          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "Readiness status=$status http=$http_code"

      # Counts how many of the most recently *completed* prior runs of this
      # workflow+branch failed in a row, +1 for this failing check. Because of
      # the job invariant above, a completed conclusion of "failure" means the
      # readiness probe failed on that run (not that some side-effect step
      # errored), so prior conclusions are a faithful readiness history. This
      # run's own conclusion isn't recorded until the job finishes, so it is
      # naturally excluded. GitHub's run history is reused as the durable
      # counter instead of standing up a separate cache/state file.
      #
      # continue-on-error + a defaulted output keep a transient `gh` hiccup here
      # from failing the job (which would itself pollute the conclusion future
      # runs read) while still handing downstream steps a valid integer.
      - name: Count consecutive readiness failures
        id: streak
        continue-on-error: true
        shell: bash
        run: |
          # No `set -e`: a gh failure must not abort before we emit an output.
          set -uo pipefail
          if [ "${{ steps.check.outputs.status }}" != "fail" ]; then
            echo "streak=0" >> "$GITHUB_OUTPUT"
            echo "Readiness ok; streak=0"
            exit 0
          fi

          # Conservative default if run history can't be read: assume only this
          # one check (below threshold -> no escalation, no false page). The
          # readiness gate below still fails the run loudly regardless. A later
          # same-key write wins, so the computed value replaces this default.
          echo "streak=1" >> "$GITHUB_OUTPUT"

          prior_conclusions=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --limit 20 \
            --json status,conclusion \
            --jq '[.[] | select(.status == "completed") | .conclusion]' 2>/dev/null) || {
              echo "Could not read run history; defaulting streak=1"
              exit 0
            }

          streak=1
          for conclusion in $(echo "$prior_conclusions" | jq -r '.[]'); do
            if [ "$conclusion" = "failure" ]; then
              streak=$((streak + 1))
            else
              break
            fi
          done

          echo "streak=$streak" >> "$GITHUB_OUTPUT"
          echo "Consecutive failed readiness checks including this one: $streak"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open a fresh incident issue on sustained failure
        if: >-
          steps.check.outputs.status == 'fail' &&
          fromJSON(steps.streak.outputs.streak) >= fromJSON(env.FAILURE_THRESHOLD)
        # Side-effect: must never flip the run conclusion the streak counter
        # reads (see job invariant). The readiness gate still fails the run.
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          gh label create incident \
            --repo "$GITHUB_REPOSITORY" \
            --color B60205 \
            --description "Production availability incident" \
            --force
          issue_number=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label incident \
            --limit 100 \
            --json number,title | jq -r --arg title "$INCIDENT_TITLE" 'first(.[] | select(.title == $title) | .number) // empty')
          message="Readiness failed at $(date -u +'%Y-%m-%dT%H:%M:%SZ'). HTTP status: ${{ steps.check.outputs.http_code }}. Consecutive failed checks: ${{ steps.streak.outputs.streak }}. Endpoint: https://usage.jays.services/api/ready. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          if [ -n "$issue_number" ]; then
            # Same sustained incident already has an open, fresh-notification
            # issue from when it first crossed the threshold - add a dated
            # update instead of opening a duplicate every 5 minutes.
            gh issue comment "$issue_number" --repo "$GITHUB_REPOSITORY" --body "$message"
          else
            # First time this incident has crossed the sustained-failure bar:
            # always a brand-new issue, never a silent update folded into
            # some older, already-stale thread - this is the fresh
            # notification a human actually receives.
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$INCIDENT_TITLE" \
              --label incident \
              --body "$message"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Page PagerDuty on sustained failure
        if: >-
          steps.check.outputs.status == 'fail' &&
          fromJSON(steps.streak.outputs.streak) >= fromJSON(env.FAILURE_THRESHOLD) &&
          env.PAGERDUTY_ROUTING_KEY != ''
        # Side-effect: isolated from the run conclusion (see job invariant).
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          payload=$(jq -n \
            --arg routing_key "$PAGERDUTY_ROUTING_KEY" \
            --arg dedup_key "$PAGERDUTY_DEDUP_KEY" \
            --arg summary "usage.jays.services readiness check failing (${{ steps.streak.outputs.streak }} consecutive checks, HTTP ${{ steps.check.outputs.http_code }})" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg timestamp "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              routing_key: $routing_key,
              event_action: "trigger",
              dedup_key: $dedup_key,
              payload: {
                summary: $summary,
                source: "github-actions:uptime-monitor",
                severity: "critical",
                timestamp: $timestamp
              },
              links: [{ href: $run_url, text: "Workflow run" }]
            }')
          curl \
            --silent \
            --show-error \
            --fail \
            --max-time 10 \
            --retry 2 \
            --retry-all-errors \
            -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Resolve open incident after recovery
        if: steps.check.outputs.status == 'ok'
        # Recovery side-effect: must not fail the run (a green readiness check
        # must conclude green so it isn't later miscounted as downtime).
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          issue_number=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label incident \
            --limit 100 \
            --json number,title | jq -r --arg title "$INCIDENT_TITLE" 'first(.[] | select(.title == $title) | .number) // empty')
          if [ -n "$issue_number" ]; then
            gh issue close "$issue_number" \
              --repo "$GITHUB_REPOSITORY" \
              --comment "Readiness recovered at $(date -u +'%Y-%m-%dT%H:%M:%SZ')."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PagerDuty after recovery
        if: steps.check.outputs.status == 'ok' && env.PAGERDUTY_ROUTING_KEY != ''
        # Recovery side-effect: isolated from the run conclusion. This is the
        # exact step the P2 review flagged - a resolve failure after a healthy
        # check must NOT conclude the run as failure. continue-on-error plus the
        # non---fail curl below guarantee it stays a clean no-op on a hiccup.
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          payload=$(jq -n \
            --arg routing_key "$PAGERDUTY_ROUTING_KEY" \
            --arg dedup_key "$PAGERDUTY_DEDUP_KEY" \
            '{ routing_key: $routing_key, event_action: "resolve", dedup_key: $dedup_key }')
          # Intentionally no --fail: a best-effort recovery resolve should never
          # register as an error. A transient PagerDuty issue is logged, and the
          # next healthy run re-sends the resolve for the same dedup_key.
          http_code=$(curl \
            --silent \
            --show-error \
            --max-time 10 \
            --retry 2 \
            --retry-all-errors \
            --output /dev/null \
            --write-out '%{http_code}' \
            -X POST https://events.pagerduty.com/v2/enqueue \
            -H "Content-Type: application/json" \
            -d "$payload") || http_code="000"
          echo "PagerDuty resolve HTTP $http_code"

      # Runs last and is the SOLE step allowed to fail the run: a bad check
      # always leaves this run red (visible on the Actions tab/badge and to
      # anyone watching the repo), independent of whether the sustained-failure
      # threshold has been crossed yet. This both closes the original "reports
      # success while prod is down" gap AND is what makes the run conclusion a
      # faithful readiness signal for the streak counter above.
      - name: Fail the run on a bad readiness check
        if: steps.check.outputs.status == 'fail'
        shell: bash
        run: |
          echo "::error::Readiness check failed (HTTP ${{ steps.check.outputs.http_code }}, streak ${{ steps.streak.outputs.streak }})."
          exit 1
