name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        id: check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://usage.jays.services || echo "000")
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on failure
        if: steps.check.outputs.status == 'fail'
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "🚨 Uptime Alert: usage.jays.services returned HTTP ${{ steps.check.outputs.http_code }}" \
            --label "incident" \
            --body "Health check failed at $(date -u). HTTP status: ${{ steps.check.outputs.http_code }}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
