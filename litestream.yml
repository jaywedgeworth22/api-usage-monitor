# Litestream 0.5.x config. Schema notes (verified against the v0.5.13 binary /
# cmd/litestream/main.go structs + a real `litestream databases` parse):
#   - 0.5.x takes a SINGLE `replica:` per db (the 0.4.x `replicas:` array is
#     deprecated, and retention/snapshot keys placed under a replica are silently
#     ignored by yaml.v2 - a ReplicaConfig has no such fields).
#   - Snapshot cadence/retention is a top-level `snapshot:` block (Config.Snapshot,
#     the global default that applyValues/validate reads). This is what actually
#     bounds the point-in-time restore window; without it litestream falls back to
#     its 24h default retention. (A per-db `snapshot:` also works and is promoted to
#     the global via applyDBSnapshotConfig, but the top-level form is the documented
#     canonical location, so we use it here to be unambiguous.)
#   - Env vars are expanded with Go's os.Getenv (NOT bash), so `${VAR:-default}`
#     does not work - use a bare `${VAR}`. An empty region is fine here: with an
#     S3 endpoint set (R2 always sets one) Litestream falls back to us-east-1 and
#     R2 accepts any region for SigV4.

# Point-in-time retention: keep 7 days of snapshot history, a fresh snapshot
# every 24h. Was 720h (30d) — too large for the shared Hetzner Garage volume
# (~14 GiB in ~3 days of LTX at prod write rate). 168h still covers weekly
# restore drills; operator can raise later if Garage moves off the 75G box.
# Litestream 0.5.x stores LTX files and GCs snapshots older than `retention`;
# the finer-grained LTX/WAL window is governed by the default l0-retention.
snapshot:
  interval: 24h
  retention: 168h

dbs:
  - path: /data/prod.db
    replica:
      type: s3
      bucket: ${LITESTREAM_S3_BUCKET}
      path: api-usage-monitor/prod.db
      region: ${LITESTREAM_S3_REGION}
      endpoint: ${LITESTREAM_S3_ENDPOINT}
      access-key-id: ${LITESTREAM_S3_ACCESS_KEY_ID}
      secret-access-key: ${LITESTREAM_S3_SECRET_ACCESS_KEY}
      # Keep each 5 MiB multipart part within reverse-proxy request deadlines
      # on bandwidth-constrained cross-region links. Five concurrent parts can
      # each exceed the deadline while competing for the same uplink.
      concurrency: 1
