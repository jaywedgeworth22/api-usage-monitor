# Custom domain: usage.jays.services
# DNS is managed by Cloudflare (CNAME to api-usage-monitor.onrender.com, proxied)
# SSL: Cloudflare "Full (strict)" mode + Render's own cert
#
# This app runs as a single Render web service - no separate database or cron
# resource - to minimize hosting cost. Data lives in a SQLite file on a Render
# disk, and the periodic usage-polling job that used to be a separate cron
# service now runs in-process inside the web service (see
# src/instrumentation.ts / src/lib/usage-recorder.ts).
services:
  - type: web
    name: api-usage-monitor
    runtime: node
    plan: starter
    autoDeployTrigger: checksPass
    # Render uses this as a liveness/restart signal. Keep it independent of
    # SQLite readiness: restarting during an exclusive maintenance operation
    # restarts that same operation and can livelock the only instance.
    # /api/ready keeps strict dependency diagnostics in its JSON body but is
    # temporarily HTTP-liveness-safe because Render's existing service config
    # can lag this Blueprint field and continue probing that endpoint.
    healthCheckPath: /api/health
    buildFilter:
      ignoredPaths:
        - docs/**
        - "**/*.md"
    disk:
      name: api-usage-monitor-data
      mountPath: /data
      sizeGB: 1
    # Render only mounts a service's persistent disk at RUNTIME, not during the
    # build step (the build environment's filesystem is read-only at /data) -
    # confirmed empirically: `prisma db push` in buildCommand failed with
    # "Read-only file system" trying to create /data/prod.db. So the schema
    # push has to run in startCommand instead, once the disk is actually
    # mounted, before `npm start` boots the server.
    #
    # migrate-safe.mjs runs at startup and:
    #   - Creates the DB from scratch if it doesn't exist (first deploy)
    #   - Applies additive-only changes (new tables, new columns) safely
    #   - Refuses to apply destructive changes (removed tables/columns,
    #     table recreation) and prints manual-migration instructions
    # This replaces the previous `prisma db push --accept-data-loss` which
    # could silently drop and recreate tables on every deploy.
    #
    # fetch-litestream.sh downloads a pinned Litestream binary into ./bin at
    # build time (idempotent; cheap no-op if the disk-backed build cache
    # already has the right version). start-with-litestream.sh decides at
    # runtime whether to actually replicate, based on the LITESTREAM_S3_*
    # envVars below: unset (the default) -> take a bounded verified local
    # pre-migration backup, migrate, and start without replication; the four
    # required vars set (BUCKET/ENDPOINT/ACCESS_KEY_ID/SECRET_ACCESS_KEY;
    # REGION is optional) -> restore if needed, take the same local backup,
    # migrate, then continuously replicate /data/prod.db to Cloudflare R2 via
    # litestream.yml. See docs/litestream.md.
    buildCommand: npm ci && npm run build && bash scripts/fetch-litestream.sh
    startCommand: bash scripts/start-with-litestream.sh
    envVars:
      # Keep local development, CI, and Render on the same supported runtime.
      # This value has higher precedence than .node-version on Render.
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_OPTIONS
        value: --max-old-space-size=350
      - key: DATABASE_URL
        value: file:/data/prod.db
      # Keep the newest verified transaction-consistent snapshots beside the
      # SQLite DB. Startup creates one before every migrate-safe run and fails
      # closed for an existing DB if backup or integrity verification fails.
      - key: SQLITE_PRE_MIGRATION_BACKUP_RETENTION
        value: "1"
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: USAGE_INGEST_TOKEN
        generateValue: true
      - key: BILLING_RECEIPT_INGEST_TOKEN
        sync: false
      - key: BILLING_RECEIPT_IDENTITY_KEY
        sync: false
      - key: BILLING_RECEIPT_HMAC_KEY
        sync: false
      # GET /api/budget-status authenticates with USAGE_READ_TOKEN, falling back
      # to USAGE_INGEST_TOKEN when unset (see src/app/api/budget-status/route.ts).
      # We intentionally do NOT provision a distinct USAGE_READ_TOKEN here: prod
      # read access reuses the ingest token, so sibling apps polling spend use the
      # value they already hold. To hand out read-only access without ingest
      # rights, add a distinct USAGE_READ_TOKEN in the Render dashboard.
      - key: DASHBOARD_PASSWORD
        generateValue: true
      # Optional Infisical provider-credential rotation. Project/path defaults
      # are verified in code, so production only needs the three Universal Auth
      # ID/secret pairs. Render never generates or copies these values.
      - key: INFISICAL_PROVIDER_SYNC_ENABLED
        value: "true"
      # Default-off one-time create-only bootstrap for the exact current ST
      # Gemini provider. Enable only for the reviewed migration run, then set
      # it back to false immediately; this is not a reverse-sync switch.
      - key: INFISICAL_ST_GEMINI_BOOTSTRAP_ENABLED
        value: "false"
      # Optional exact UUID for the reviewed legacy Cloudflare Subscription.
      # Unset is disabled; Render never generates or discovers this identity.
      - key: CLOUDFLARE_LEGACY_HANDOFF_SUBSCRIPTION_ID
        sync: false
      - key: INFISICAL_BASE_URL
        value: https://app.infisical.com
      - key: INFISICAL_ENV
        value: prod
      - key: INFISICAL_ST_CLIENT_ID
        sync: false
      - key: INFISICAL_ST_CLIENT_SECRET
        sync: false
      - key: INFISICAL_CT_CLIENT_ID
        sync: false
      - key: INFISICAL_CT_CLIENT_SECRET
        sync: false
      - key: INFISICAL_SHARED_CLIENT_ID
        sync: false
      - key: INFISICAL_SHARED_CLIENT_SECRET
        sync: false
      # Optional: enables the read-only Sentry Health dashboard card
      # (GET /api/sentry-health). `sync: false` means Render won't generate
      # or sync a value - set these manually in the dashboard's Environment
      # tab if/when wanted; the card renders nothing while they're unset.
      - key: SENTRY_READ_TOKEN
        sync: false
      - key: SENTRY_ORG
        sync: false
      # Optional: outbound provider-alert delivery. Leave unset for dashboard-only alerts.
      - key: ALERT_SLACK_WEBHOOK_URL
        sync: false
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL_FROM
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
      - key: ALERT_PAGERDUTY_ROUTING_KEY
        sync: false
      - key: ALERT_MIN_SEVERITY
        value: warning
      - key: ALERT_REMINDER_HOURS
        value: "24"
      # Raw-row retention before daily rollup + pruning. External usage rows are
      # never pruned from the current UTC month because budget math reads them.
      - key: USAGE_SNAPSHOT_RAW_RETENTION_DAYS
        value: "45"
      - key: EXTERNAL_USAGE_EVENT_RAW_RETENTION_DAYS
        value: "90"
      - key: EXTERNAL_USAGE_EVENT_TOMBSTONE_RETENTION_DAYS
        value: "180"
      # Optional: continuous Litestream replication of /data/prod.db to an
      # S3-compatible bucket (Cloudflare R2), for backup/durability beyond
      # the Render disk itself. The four of BUCKET/ENDPOINT/ACCESS_KEY_ID/
      # SECRET_ACCESS_KEY must all be set to enable replication; REGION is
      # optional (an empty region is fine for R2, which accepts any region
      # for SigV4). `sync: false` means Render won't generate or sync values
      # - set these manually in the dashboard's Environment tab if/when
      # wanted. Leave the four required unset (the default) and
      # start-with-litestream.sh runs the server exactly as it does today,
      # with no replication and no litestream process. See docs/litestream.md
      # for setup + restore runbook.
      - key: LITESTREAM_S3_BUCKET
        sync: false
      - key: LITESTREAM_S3_REGION
        sync: false
      - key: LITESTREAM_S3_ENDPOINT
        sync: false
      - key: LITESTREAM_S3_ACCESS_KEY_ID
        sync: false
      - key: LITESTREAM_S3_SECRET_ACCESS_KEY
        sync: false
      # Set to true after the replica credentials are provisioned and a restore
      # drill succeeds. Partial/configured-but-unavailable replication already
      # fails closed regardless of this flag; true additionally forbids an
      # entirely unconfigured backup path.
      - key: LITESTREAM_REQUIRED
        sync: false
