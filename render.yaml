# Custom domain: usage.jays.services
# DNS is managed by Cloudflare (CNAME to api-usage-monitor.onrender.com, proxied)
# SSL: Cloudflare "Full (strict)" mode + Render's own cert
#
# This app runs as a single Render web service - no separate database or cron
# resource - to minimize hosting cost. Data lives in a SQLite file on a Render
# disk, and the periodic usage-polling job that used to be a separate cron
# service now runs in-process inside the web service (see
# src/instrumentation.ts / src/lib/usage-recorder.ts).
services:
  - type: web
    name: api-usage-monitor
    env: node
    plan: starter
    disk:
      name: api-usage-monitor-data
      mountPath: /data
      sizeGB: 1
    # Render only mounts a service's persistent disk at RUNTIME, not during the
    # build step (the build environment's filesystem is read-only at /data) -
    # confirmed empirically: `prisma db push` in buildCommand failed with
    # "Read-only file system" trying to create /data/prod.db. So the schema
    # push has to run in startCommand instead, once the disk is actually
    # mounted, before `npm start` boots the server.
    #
    # migrate-safe.mjs runs at startup and:
    #   - Creates the DB from scratch if it doesn't exist (first deploy)
    #   - Applies additive-only changes (new tables, new columns) safely
    #   - Refuses to apply destructive changes (removed tables/columns,
    #     table recreation) and prints manual-migration instructions
    # This replaces the previous `prisma db push --accept-data-loss` which
    # could silently drop and recreate tables on every deploy.
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node scripts/migrate-safe.mjs && npm start
    envVars:
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: USAGE_INGEST_TOKEN
        generateValue: true
      - key: DASHBOARD_PASSWORD
        generateValue: true
