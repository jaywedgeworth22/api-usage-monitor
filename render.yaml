# Custom domain: usage.jays.services
# DNS is managed by Cloudflare (CNAME to api-usage-monitor.onrender.com, proxied)
# SSL: Cloudflare "Full (strict)" mode + Render's own cert
#
# This app runs as a single Render web service - no separate database or cron
# resource - to minimize hosting cost. Data lives in a SQLite file on a Render
# disk, and the periodic usage-polling job that used to be a separate cron
# service now runs in-process inside the web service (see
# src/instrumentation.ts / src/lib/usage-recorder.ts).
services:
  - type: web
    name: api-usage-monitor
    env: node
    plan: starter
    disk:
      name: api-usage-monitor-data
      mountPath: /data
      sizeGB: 1
    # --accept-data-loss is required because prisma db push always flags certain
    # schema changes as a potential data-loss risk that it cannot statically
    # prove is safe. On SQLite specifically, be extra cautious with this flag:
    # SQLite's ALTER TABLE support is very limited, so `prisma db push` frequently
    # has to recreate whole tables (copy to a temp table, drop, recreate, copy
    # back) to apply many kinds of schema changes - not just a lightweight ALTER
    # like Postgres can usually do. That's a heavier, easier-to-get-wrong
    # operation against a live production database file. Any FUTURE schema
    # change here should be reviewed carefully - e.g. by running
    # `prisma migrate diff --script` against a copy of the real production SQLite
    # file - before assuming --accept-data-loss is safe to keep passing blindly.
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: USAGE_INGEST_TOKEN
        generateValue: true
      - key: DASHBOARD_PASSWORD
        generateValue: true
