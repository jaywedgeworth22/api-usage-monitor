<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
    }
    p.note {
      font-size: 12px;
      color: #666;
      margin: 0 0 12px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    #openBtn {
      background: #000;
      color: #fff;
      margin-bottom: 8px;
    }
    #openBtn:hover {
      background: #333;
    }
    #saveBtn {
      background: #f1f1f1;
      color: #333;
    }
    #openAppBtn {
      background: #e8f0ff;
      color: #154aa0;
      margin-bottom: 8px;
    }
    #saveBtn:hover {
      background: #e4e4e4;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #059669;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Usage Monitor</h2>
  <p class="note">Opens your self-hosted dashboard. This extension reads no site data.</p>
  <div class="field">
    <label for="dashboardUrl">Dashboard URL</label>
    <input type="text" id="dashboardUrl" placeholder="e.g. https://usage.jays.services">
  </div>
  <button id="openBtn">Open Dashboard</button>
  <button id="openAppBtn">Open iPhone/iPad App</button>
  <button id="saveBtn">Save URL</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
