<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover {
      background: #333;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #059669;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Usage Monitor Config</h2>
  <div class="field">
    <label for="apiUrl">Monitor API URL</label>
    <input type="text" id="apiUrl" placeholder="e.g. http://localhost:4103">
  </div>
  <div class="field">
    <label for="apiToken">USAGE_INGEST_TOKEN</label>
    <input type="password" id="apiToken" placeholder="Enter token">
  </div>
  <button id="saveBtn">Save Configuration</button>
  <div id="status">Saved successfully!</div>
  
  <script src="popup.js"></script>
</body>
</html>
