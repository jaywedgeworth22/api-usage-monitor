name: oracle

# This file is installed root-owned at /etc/usage-monitor/compose.yaml.
# Production deploys must use that installed copy, never a compose file from a
# newly fetched revision. In particular, there is intentionally no `build:`
# key and no repo-controlled host mount.
services:
  app:
    image: usage-monitor:${USAGE_MONITOR_REVISION:?USAGE_MONITOR_REVISION is required}
    pull_policy: never
    env_file:
      - /etc/usage-monitor/usage-monitor.env
    environment:
      DATABASE_URL: file:/data/prod.db
      GIT_COMMIT_SHA: ${USAGE_MONITOR_REVISION}
      PORT: "3000"
    user: "1000:1000"
    volumes:
      - /data:/data
    # Keep Docker-level restart disabled permanently. Only systemd may start the
    # SQLite writer, after ConditionPathIsMountPoint/RequiresMountsFor verify
    # that /data is the dedicated block volume.
    restart: "no"
    stop_grace_period: 60s
    mem_limit: 4g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    pull_policy: never
    environment:
      USAGE_MONITOR_HOSTNAME: ${USAGE_MONITOR_HOSTNAME:?USAGE_MONITOR_HOSTNAME is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - /etc/usage-monitor/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - internal

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
