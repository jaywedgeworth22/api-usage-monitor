services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: usage-monitor:${USAGE_MONITOR_REVISION:-local}
    env_file:
      - /etc/usage-monitor/usage-monitor.env
    environment:
      DATABASE_URL: file:/data/prod.db
      PORT: "3000"
    volumes:
      - /data:/data
    restart: unless-stopped
    stop_grace_period: 60s
    mem_limit: 4g
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal

  caddy:
    image: caddy:2.10.2-alpine
    environment:
      USAGE_MONITOR_HOSTNAME: ${USAGE_MONITOR_HOSTNAME:-usage-oracle.132.226.90.164.sslip.io}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - internal

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
